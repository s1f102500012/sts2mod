upstream redpacket_relay_backend {
    server 127.0.0.1:18080;
    keepalive 64;
}

upstream hextech_telemetry_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name 39.96.216.77;

    root /opt/hextech-runes-telemetry/app/public;
    index index.html;
    charset utf-8;

    access_log off;
    log_not_found off;
    client_max_body_size 256k;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/xml application/xml+rss image/svg+xml;

    location = / {
        proxy_pass http://hextech_telemetry_backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location = /index.html {
        proxy_pass http://hextech_telemetry_backend/index.html;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location /rp/ {
        proxy_pass http://redpacket_relay_backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log /var/log/nginx/redpacket-access.log;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/hextech-runes/ {
        proxy_pass http://hextech_telemetry_backend/api/hextech-runes/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location = /health {
        proxy_pass http://hextech_telemetry_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
